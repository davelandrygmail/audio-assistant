# ──────────────────────────────────────────────
# Audio Assistant — Configuration
# ──────────────────────────────────────────────
# Secrets (API keys, tokens) go in .env, not here.
# See .env.example for the required variables.

paths:
  # Where to watch for new audio files
  watch_dir: "~/Recordings"

  # Output directories (created on demand)
  transcripts_dir: "~/meeting_reports/transcripts"
  reports_dir: "~/meeting_reports"
  archive_dir: "~/meeting_reports/original_recording"

models:
  whisper: "distil-large-v2"
  whisper_device: "cpu"
  whisper_compute_type: "int8"
  # Auto-detect spoken language (English → distil-large-v2, French → medium).
  # When off, always uses the whisper model above.
  language_detection: true

diarization:
  # "lightweight" (default, faster) or "pyannote" (original, slower)
  method: "lightweight"
  # Only used with pyannote — HF model name
  pyannote_model: "pyannote/speaker-diarization-3.1"
  # Agglomerative clustering threshold for lightweight backend.
  # Cosine distance (0 = identical, 1 = orthogonal, 2 = opposite).
  # Lower values create more speaker splits; higher values merge more.
  # If the threshold produces >10 speakers, the pipeline auto-estimates
  # the correct count via silhouette score as a safety net.
  # Typical range: 0.45–0.65 for conversational speech.
  clustering_threshold: 0.55

llm:
  provider: "openrouter"
  base_url: "https://openrouter.ai/api/v1"
  model: "openrouter/free"
  temperature: 0.2

processing:
  debounce_seconds: 2.0
  # Chunk long audio files into segments for faster transcription.
  # Set to 0 to disable (always process as one file).
  chunk_minutes: 20     # files > this get split into chunks
  chunk_overlap: 5      # seconds of overlap between chunks
  supported_extensions:
    - ".mp3"
    - ".wav"
    - ".m4a"
    - ".flac"
    - ".ogg"
    - ".webm"

notifications:
  # ntfy.sh topic for push notifications (leave empty to disable).
  # Subscribe to https://ntfy.sh/{topic} on your phone to receive
  # alerts when processing starts, changes phase, completes, or fails.
  ntfy_topic: "hermes-notifier-20260722-cdndave"

# ──────────────────────────────────────────────
# Audio Assistant — Configuration
# ──────────────────────────────────────────────
# Secrets (API keys, tokens) go in .env, not here.
# See .env.example for the required variables.

paths:
  # Where to watch for new audio files
  watch_dir: "~/Recordings"

  # Output directories (created on demand)
  transcripts_dir: "~/meeting_reports/transcripts"
  reports_dir: "~/meeting_reports"
  archive_dir: "~/meeting_reports/original_recording"

models:
  whisper: "distil-large-v2"
  whisper_device: "cpu"
  whisper_compute_type: "int8"

diarization:
  # "lightweight" (default, faster) or "pyannote" (original, slower)
  method: "lightweight"
  # Only used with pyannote — HF model name
  pyannote_model: "pyannote/speaker-diarization-3.1"
  # Agglomerative clustering threshold for lightweight backend.
  # Lower = more speaker splits, higher = fewer.
  # Tune between 0.3 and 0.7 depending on your recordings.
  clustering_threshold: 0.65

llm:
  provider: "openrouter"
  base_url: "https://openrouter.ai/api/v1"
  model: "openrouter/free"
  temperature: 0.2

processing:
  debounce_seconds: 2.0
  supported_extensions:
    - ".mp3"
    - ".wav"
    - ".m4a"
    - ".flac"
    - ".ogg"
    - ".webm"
